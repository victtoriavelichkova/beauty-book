<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Services | Beauty Salon</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <header class="header">
        <a href="/" class="logo">✂ Beauty <span>Salon</span></a>

        <nav class="nav">
            <a href="/dashboard" class="btn btn-outline">
                Dashboard
            </a>

            <a href="/services/pricelist" class="btn btn-outline">
                Price List
            </a>
        </nav>
    </header>

    <main class="content-box">

        <h1>Available Services</h1>

        <p style="margin-bottom:30px;">
            Browse all services offered by our salon.
        </p>

        <table>
            <thead>
            <tr>
                <th>Service</th>
                <th>Duration</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="service : ${services}">
                <td th:text="${service.name}">
                    Haircut
                </td>

                <td th:text="${service.durationMinutes + ' min'}">
                    60 min
                </td>
            </tr>
            </tbody>
        </table>

    </main>

</div>

</body>
</html>
