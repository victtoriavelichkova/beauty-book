<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile | Beauty Salon</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <header class="header">
        <a href="/dashboard" class="logo">✂ Beauty <span>Salon</span></a>

        <nav class="nav">
            <a href="/dashboard" class="btn btn-outline">Dashboard</a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn btn-outline" type="submit">
                    Logout
                </button>
            </form>
        </nav>
    </header>

    <main class="form-wrapper">

        <section class="form-card">

            <h2>My Profile</h2>
            <p>Manage your BeautyBook account</p>

            <label>Username</label>
            <input type="text" th:value="${username}" readonly>

            <label>Role</label>
            <input type="text" value="Logged User" readonly>

            <label>Account Status</label>
            <input type="text" value="Active" readonly>

            <label>Last Visit</label>
            <input type="text" th:value="${lastVisit}" readonly>

            <div style="margin-top:20px; text-align:center; color:#d6b3ff;">
                Welcome to BeautyBook!
            </div>

            <div style="margin-top:25px; text-align:center; color:#cccccc;">
                From your account you can:
                <br><br>
                ✓ Browse salon services
                <br>
                ✓ View the price list
                <br>
                ✓ Book appointments
                <br>
                ✓ Manage your salon experience
            </div>

            <div class="form-link" style="margin-top:25px;">
                <a href="/dashboard">Back to Dashboard</a>
            </div>

        </section>

    </main>

</div>

</body>
</html>
