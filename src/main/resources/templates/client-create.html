<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Client - Beauty Salon</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page">

    <header class="header">
        <a href="/" class="logo">✂ Beauty <span>Salon</span></a>

        <nav>
            <a href="/dashboard" class="btn btn-outline">Dashboard</a>

        </nav>
    </header>

    <main class="form-wrapper">

        <div class="form-card">

            <h1>Add Client</h1>
            <p>Create a new salon client</p>

            <form th:action="@{/clients/create}"
                  th:object="${clientBindingModel}"
                  method="post">

                <label>First Name</label>
                <input
                        type="text"
                        placeholder="Enter first name"
                        th:field="*{firstName}">

                <p class="error-message"
                   th:if="${#fields.hasErrors('firstName')}"
                   th:errors="*{firstName}">
                </p>

                <label>Last Name</label>
                <input
                        type="text"
                        placeholder="Enter last name"
                        th:field="*{lastName}">

                <p class="error-message"
                   th:if="${#fields.hasErrors('lastName')}"
                   th:errors="*{lastName}">
                </p>

                <label>Phone</label>
                <input
                        type="text"
                        placeholder="Enter phone number"
                        th:field="*{phone}">

                <p class="error-message"
                   th:if="${#fields.hasErrors('phone')}"
                   th:errors="*{phone}">
                </p>

                <button type="submit" class="btn btn-purple full-width">
                    Save Client
                </button>

                <a href="/clients" class="cancel-link">
                    Cancel
                </a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
